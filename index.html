<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zmhmrqc的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* 页面主体 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 站点标题 */
        .site-title {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 50px;
            text-align: center;
            color: #1d1d1f;
        }

        /* 卡片容器 - 在电脑上并排显示 */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        /* 文章卡片 */
        .article-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }
        
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .article-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 15px;
            color: #1d1d1f;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #86868b;
            margin-bottom: 20px;
        }
        
        .article-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tag {
            background-color: #f5f5f7;
            color: #515154;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
        }

        .article-content {
            color: #515154;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .read-more {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }
        
        .read-more:hover {
            color: #0052a3;
            text-decoration: underline;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px 0;
            color: #86868b;
            font-size: 14px;
            border-top: 1px solid #e5e5e7;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container {
                padding: 20px 16px;
            }
            
            .site-title {
                font-size: 28px;
                margin-bottom: 30px;
            }
            
            .cards-container {
                flex-direction: column;
                gap: 20px;
            }
            
            .article-card {
                min-width: 100%;
                padding: 20px;
            }
            
            .article-title {
                font-size: 20px;
            }
        }
        
        @media (min-width: 1200px) {
            .main-container {
                padding: 60px 40px;
            }
            
            .site-title {
                font-size: 42px;
                margin-bottom: 60px;
            }
            
            .article-card {
                padding: 35px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <!-- 站点标题 -->
        <h1 class="site-title">zmhmrqc的小站</h1>

        <!-- 卡片容器 -->
        <div class="cards-container">
            <!-- 文章卡片1 -->
            <article class="article-card">
                <h2 class="article-title">下载区</h2>
                <div class="article-meta">
                    <span class="article-date">
                        <i class="far fa-calendar"></i> 2026-03-22
                    </span>
                </div>
                <div class="article-tags">
                    <span class="tag">资源</span>
                    <span class="tag">分享</span>
                    <span class="tag">工具</span>
                </div>
                <div class="article-content">
                    蓝奏云分享
                </div>
                <a href="#" class="read-more">
                    查看详情 <i class="fas fa-chevron-right"></i>
                </a>
            </article>

            <!-- 文章卡片2 -->
            <article class="article-card">
                <h2 class="article-title">标题</h2>
                <div class="article-meta">
                    <span class="article-date">
                        <i class="far fa-calendar"></i> 时间 年-月-日
                    </span>
                </div>
                <div class="article-tags">
                    <span class="tag">标签</span>
                    <span class="tag">标签</span>
                    <span class="tag">标签</span>
                </div>
                <div class="article-content">
                    简介
                </div>
                <a href="#" class="read-more">
                    查看详情 <i class="fas fa-chevron-right"></i>
                </a>
            </article>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            © 2026 by zmhmrqc
        </div>
    </div>
</body>
</html>
