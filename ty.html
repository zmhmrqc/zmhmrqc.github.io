<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷达图标 · 内联SVG</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f7fa;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .icon-container {
            padding: 2rem;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        /* 让SVG继承容器的文字颜色，并设定一个舒适的尺寸 */
        svg {
            display: block;
            width: 180px;
            height: 180px;
            color: #1e293b;   /* 深灰蓝色，代替 currentColor */
        }
        /* 可选：添加一个非常淡的网格背景，强调透明区域 */
        .icon-container {
            background-image: radial-gradient(circle at 20% 30%, #e2e8f0 1px, transparent 1px);
            background-size: 12px 12px;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <!-- 你的原始SVG，只去掉了硬编码的width/height，让CSS控制尺寸 -->
        <svg viewBox="0 0 24 24" style="stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round;">
            <!-- 中心圆 -->
            <circle cx="12" cy="12" r="5" />
            <!-- 八条射线 (内端距圆心8，外端11，留出3单位间隙) -->
            <line x1="20" y1="12" x2="23" y2="12" />      <!-- 右 -->
            <line x1="17.656" y1="17.656" x2="19.778" y2="19.778" /> <!-- 右下 -->
            <line x1="12" y1="20" x2="12" y2="23" />      <!-- 下 -->
            <line x1="6.344" y1="17.656" x2="4.222" y2="19.778" />   <!-- 左下 -->
            <line x1="4" y1="12" x2="1" y2="12" />        <!-- 左 -->
            <line x1="6.344" y1="6.344" x2="4.222" y2="4.222" />     <!-- 左上 -->
            <line x1="12" y1="4" x2="12" y2="1" />        <!-- 上 -->
            <line x1="17.656" y1="6.344" x2="19.778" y2="4.222" />   <!-- 右上 -->
        </svg>
    </div>
</body>
</html>
